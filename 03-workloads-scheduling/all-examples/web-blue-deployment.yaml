apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-blue
  labels:
    app: web
    version: blue

spec:
  replicas: 0
  selector:
    matchLabels:
      app: web
      version: blue
  template:
    metadata:
      labels:
        app: web
        version: blue
    spec:
      containers:
      - image: nginx:1.28
        name: nginx

---
apiVersion: v1
kind: Service
metadata:
  name: web-blue
spec:
  selector:
    app: web
    version: green
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
  type: ClusterIP 
