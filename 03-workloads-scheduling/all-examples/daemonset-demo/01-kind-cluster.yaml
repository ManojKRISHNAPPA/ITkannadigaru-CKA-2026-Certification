# ============================================================
# kind cluster config — 1 control-plane + 3 worker nodes
# This is the cluster used for the DaemonSet demonstration.
#
# Create the cluster:
#   kind create cluster --name cka-demo --config 01-kind-cluster.yaml
# ============================================================

kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4

nodes:
  - role: control-plane
  - role: worker
  - role: worker
  - role: worker
