# ============================================================
# Grafana — Deployment
# Visualises node metrics collected by node-exporter
# Pre-configured with Prometheus as datasource
# ============================================================

# ── ConfigMap: Grafana datasource (auto-provisioned) ────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: monitoring
  labels:
    app: grafana
data:
  prometheus.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: false

---
# ── ConfigMap: Grafana dashboard provisioning ───────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: monitoring
  labels:
    app: grafana
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        folder: CKA Demo
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards

---
# ── ConfigMap: Node Overview Dashboard JSON ─────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-node-dashboard
  namespace: monitoring
  labels:
    app: grafana
data:
  node-overview.json: |
    {
      "id": null,
      "title": "Node Overview — DaemonSet Demo",
      "uid": "cka-node-overview",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "10s",
      "panels": [
        {
          "id": 1,
          "title": "CPU Usage per Node (%)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "targets": [
            {
              "expr": "100 - (avg by (node) (rate(node_cpu_seconds_total{mode=\"idle\"}[2m])) * 100)",
              "legendFormat": "{{node}}"
            }
          ]
        },
        {
          "id": 2,
          "title": "Memory Usage per Node (%)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "targets": [
            {
              "expr": "100 - ((node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100)",
              "legendFormat": "{{node}}"
            }
          ]
        },
        {
          "id": 3,
          "title": "node-exporter Pods (DaemonSet — 1 per node)",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 8},
          "targets": [
            {
              "expr": "count(up{job=\"node-exporter\"})",
              "legendFormat": "Active node-exporter pods"
            }
          ]
        },
        {
          "id": 4,
          "title": "Node Load Average (1m)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 12},
          "targets": [
            {
              "expr": "node_load1",
              "legendFormat": "{{node}}"
            }
          ]
        },
        {
          "id": 5,
          "title": "Filesystem Usage (%)",
          "type": "bargauge",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 12},
          "targets": [
            {
              "expr": "100 - ((node_filesystem_avail_bytes{mountpoint=\"/\"} / node_filesystem_size_bytes{mountpoint=\"/\"}) * 100)",
              "legendFormat": "{{node}}"
            }
          ]
        }
      ]
    }

---
# ── Secret: Grafana admin credentials ───────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: grafana-secret
  namespace: monitoring
  labels:
    app: grafana
type: Opaque
stringData:
  admin-user: admin
  admin-password: admin123         # Change in real environments

---
# ── Deployment: Grafana ──────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:10.4.2
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: grafana-secret
                  key: admin-user
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-secret
                  key: admin-password
            - name: GF_PATHS_PROVISIONING
              value: /etc/grafana/provisioning
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: node-dashboard
              mountPath: /var/lib/grafana/dashboards
            - name: storage
              mountPath: /var/lib/grafana
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: node-dashboard
          configMap:
            name: grafana-node-dashboard
        - name: storage
          emptyDir: {}

---
# ── Service: expose Grafana via NodePort (kind hostPort: 30000) ──
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app: grafana
spec:
  selector:
    app: grafana
  ports:
    - name: http
      port: 3000
      targetPort: http
      nodePort: 30000
  type: NodePort
